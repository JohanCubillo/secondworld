<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto - Second World</title>
  <link rel="stylesheet" href="css/frontend.css?v=3">
  <style>
    .producto-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 100px 24px 80px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 28px;
      transition: color 0.2s;
    }
    .back-link:hover { color: white; }
    .producto-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }
    @media(max-width:768px) { .producto-grid { grid-template-columns: 1fr; } }

    /* Galería */
    .galeria { position: sticky; top: 100px; }
    .img-principal {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 20px;
      overflow: hidden;
      background: white;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      margin-bottom: 12px;
    }
    .img-principal img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .img-principal img:hover { transform: scale(1.04); }
    .miniaturas {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .miniatura {
      width: 70px;
      height: 70px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      background: white;
    }
    .miniatura:hover { border-color: #667eea; }
    .miniatura.active { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
    .miniatura img { width: 100%; height: 100%; object-fit: cover; }

    /* Info */
    .producto-info {
      background: white;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .producto-categoria {
      font-size: 12px;
      font-weight: 700;
      color: #667eea;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .producto-nombre {
      font-size: 26px;
      font-weight: 800;
      color: #1a1f3a;
      margin-bottom: 16px;
      line-height: 1.2;
    }
    .producto-precio {
      font-size: 36px;
      font-weight: 800;
      color: #667eea;
      margin-bottom: 20px;
    }
    .producto-precio .original {
      font-size: 18px;
      color: #a0aec0;
      text-decoration: line-through;
      margin-left: 8px;
    }
    .producto-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .badge-item {
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 700;
      background: #f0f4ff;
      color: #667eea;
    }
    .badge-item.condition { background: #f7fafc; color: #4a5568; }
    .divider { height: 1px; background: #f0f4ff; margin: 20px 0; }
    .producto-desc {
      font-size: 14px;
      color: #718096;
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .tienda-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #4a5568;
    }
    .tienda-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
    }
    .stock-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .stock-ok { background: #f0fff4; color: #276749; }
    .stock-low { background: #fffaf0; color: #c05621; }
    .stock-out { background: #fff5f5; color: #c53030; }
    .add-cart-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 24px rgba(102,126,234,0.4);
    }
    .add-cart-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(102,126,234,0.5); }
    .add-cart-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .wa-btn {
      width: 100%;
      padding: 13px;
      background: white;
      color: #25D366;
      border: 2px solid #25D366;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
      text-decoration: none;
      display: block;
      text-align: center;
    }
    .wa-btn:hover { background: #f0fff4; }
    .loading-state {
      text-align: center;
      padding: 80px 24px;
      color: rgba(255,255,255,0.7);
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="space-background"><div class="stars"></div></div>

  <header class="header">
    <div class="header-container">
      <div class="logo-section">
        <img src="assets/images/logo.png" alt="Second World" class="logo" style="height:45px">
        <span class="brand-name">Second World</span>
      </div>
      <nav class="nav-menu">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="index.html#stores" class="nav-link">Tiendas</a>
        <a href="index.html#productos" class="nav-link active">Productos</a>
        <a href="order-confirmation.html" class="nav-link">Rastrear Orden</a>
        <a href="contacto.html" class="nav-link">Contacto</a>
        <a href="politicas.html" class="nav-link">Políticas</a>
      </nav>
      <div style="display:flex;gap:16px;align-items:center">
        <button class="cart-button" onclick="openCartModal()">🛒 Carrito (<span id="cart-count">0</span>)</button>
      </div>
    </div>
  </header>

  <div class="producto-wrap">
    <a href="index.html#productos" class="back-link">← Volver a productos</a>
    <div id="loading" class="loading-state">Cargando producto...</div>
    <div id="producto-contenido" style="display:none">
      <div class="producto-grid">
        <!-- Galería -->
        <div class="galeria">
          <div class="img-principal">
            <img id="img-main" src="" alt="Producto">
          </div>
          <div class="miniaturas" id="miniaturas"></div>
        </div>
        <!-- Info -->
        <div class="producto-info">
          <div class="producto-categoria" id="info-categoria"></div>
          <div class="producto-nombre" id="info-nombre"></div>
          <div class="producto-precio" id="info-precio"></div>
          <div class="producto-badges" id="info-badges"></div>
          <div class="stock-badge" id="info-stock"></div>
          <div class="divider"></div>
          <div class="producto-desc" id="info-desc"></div>
          <div class="tienda-row" id="info-tienda"></div>
          <button class="add-cart-btn" id="btn-carrito" onclick="agregarAlCarrito()">
            🛒 Agregar al Carrito
          </button>
          <a href="https://wa.me/50670259400" target="_blank" class="wa-btn">
            📱 Consultar por WhatsApp
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/frontend.js"></script>
  <script>
    let productoActual = null;

    async function cargarProducto() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) { window.location.href = 'index.html'; return; }

      try {
        const res = await fetch(`${API_URL}/products/${id}`);
        if (!res.ok) throw new Error('No encontrado');
        const p = await res.json();
        productoActual = p;
        renderProducto(p);
      } catch(e) {
        document.getElementById('loading').textContent = '❌ Producto no encontrado';
      }
    }

    function renderProducto(p) {
      document.title = p.name + ' - Second World';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('producto-contenido').style.display = 'block';

      // Imagen principal
      const imgMain = document.getElementById('img-main');
      imgMain.src = p.image || 'assets/images/placeholder.png';
      imgMain.alt = p.name;

      // Miniaturas
      const miniaturas = document.getElementById('miniaturas');
      const todasImagenes = [{ image: p.image, id: 'main' }, ...(p.images || [])];

      if (todasImagenes.length > 1) {
        miniaturas.innerHTML = todasImagenes.map((img, i) => `
          <div class="miniatura ${i === 0 ? 'active' : ''}" onclick="cambiarImagen('${img.image}', this)">
            <img src="${img.image}" alt="Imagen ${i+1}">
          </div>
        `).join('');
      }

      // Info
      document.getElementById('info-categoria').textContent = p.category?.name || '';
      document.getElementById('info-nombre').textContent = p.name;

      const precioOriginal = p.discount > 0
        ? `₡${(p.price * (1 - p.discount/100)).toFixed(2)} <span class="original">₡${parseFloat(p.price).toFixed(2)}</span>`
        : `₡${parseFloat(p.price).toFixed(2)}`;
      document.getElementById('info-precio').innerHTML = precioOriginal;

      // Badges
      const condiciones = { nuevo:'🆕 Nuevo', como_nuevo:'✨ Como Nuevo', usado:'👕 Usado', muy_usado:'⚠️ Muy Usado' };
      let badges = `<span class="badge-item condition">${condiciones[p.condition] || p.condition}</span>`;
      if (p.size) badges += `<span class="badge-item">📏 Talla ${p.size}</span>`;
      if (p.discount > 0) badges += `<span class="badge-item" style="background:#fff5f0;color:#e53e3e">-${p.discount}% OFF</span>`;
      if (p.isFlashSale) badges += `<span class="badge-item" style="background:#fff5f0;color:#e53e3e">🔥 Remate</span>`;
      document.getElementById('info-badges').innerHTML = badges;

      // Stock
      const stockEl = document.getElementById('info-stock');
      const btnCarrito = document.getElementById('btn-carrito');
      if (p.stock === 0) {
        stockEl.textContent = 'Agotado';
        stockEl.className = 'stock-badge stock-out';
        btnCarrito.disabled = true;
        btnCarrito.textContent = 'Sin stock';
      } else if (p.stock <= 3) {
        stockEl.textContent = `¡Solo ${p.stock} disponible${p.stock > 1 ? 's' : ''}!`;
        stockEl.className = 'stock-badge stock-low';
      } else {
        stockEl.textContent = `${p.stock} disponibles`;
        stockEl.className = 'stock-badge stock-ok';
      }

      // Descripción
      const descEl = document.getElementById('info-desc');
      descEl.textContent = p.description || 'Sin descripción disponible.';
      if (!p.description) descEl.style.display = 'none';

      // Tienda
      if (p.store) {
        document.getElementById('info-tienda').innerHTML = `
          <div class="tienda-icon">🏪</div>
          <div><div style="font-weight:600">${p.store.name}</div><div style="font-size:12px;color:#a0aec0">Tienda vendedora</div></div>
        `;
      }
    }

    function cambiarImagen(src, el) {
      document.getElementById('img-main').src = src;
      document.querySelectorAll('.miniatura').forEach(m => m.classList.remove('active'));
      el.classList.add('active');
    }

    function agregarAlCarrito() {
      if (!productoActual) return;
      // Usar la función global del frontend.js
      addToCart({
        id: productoActual.id,
        name: productoActual.name,
        price: productoActual.discount > 0
          ? productoActual.price * (1 - productoActual.discount/100)
          : productoActual.price,
        image: productoActual.image,
        stock: productoActual.stock
      });
      document.getElementById('btn-carrito').textContent = '✅ Agregado al carrito';
      setTimeout(() => {
        document.getElementById('btn-carrito').textContent = '🛒 Agregar al Carrito';
      }, 2000);
    }

    // Estrellas
    const s = document.querySelector('.stars');
    for (let i = 0; i < 100; i++) {
      const el = document.createElement('div');
      el.className = 'star';
      el.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;
      s.appendChild(el);
    }

    cargarProducto();
  </script>
</body>
</html>
