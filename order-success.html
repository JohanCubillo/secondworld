<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Pedido Confirmado! - Second World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #0a0e27 0%, #1a1f3a 50%, #2d1b4e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .stars {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    .success-card {
      background: white;
      border-radius: 24px;
      padding: 50px 40px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .checkmark {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
      animation: pop 0.5s ease 0.3s both;
      box-shadow: 0 8px 30px rgba(102,126,234,0.4);
    }
    @keyframes pop {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      color: #1a1f3a;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 16px;
      color: #718096;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .order-info {
      background: #f8faff;
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 32px;
      border: 1px solid #e8ecff;
    }
    .order-number {
      font-size: 13px;
      color: #718096;
      margin-bottom: 4px;
    }
    .order-id {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .steps {
      display: flex;
      justify-content: space-between;
      margin-bottom: 36px;
      gap: 8px;
    }
    .step {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .step-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 12px rgba(102,126,234,0.3);
    }
    .step-label {
      font-size: 12px;
      color: #718096;
      font-weight: 600;
      text-align: center;
    }
    .step-line {
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      align-self: center;
      margin-bottom: 22px;
    }
    .steps-container {
      display: flex;
      align-items: flex-start;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      border: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 6px 20px rgba(102,126,234,0.4);
      margin-right: 12px;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(102,126,234,0.5); }
    .btn-secondary {
      background: #f7fafc;
      color: #4a5568;
      border: 1px solid #e2e8f0;
    }
    .btn-secondary:hover { background: #edf2f7; }
  </style>
</head>
<body>
  <canvas class="stars" id="stars"></canvas>
  <div class="container">
    <div class="success-card">
      <div class="checkmark">🎉</div>
      <h1>¡Pedido Confirmado!</h1>
      <p class="subtitle">Tu pedido fue recibido exitosamente.<br>Te enviaremos un correo con los detalles.</p>

      <div class="order-info">
        <div class="order-number">Número de orden</div>
        <div class="order-id" id="order-id">#---</div>
      </div>

      <div class="steps-container">
        <div class="step">
          <div class="step-icon">✅</div>
          <div class="step-label">Confirmado</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-icon">📦</div>
          <div class="step-label">Preparando</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-icon">🚚</div>
          <div class="step-label">En camino</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-icon">🏠</div>
          <div class="step-label">Entregado</div>
        </div>
      </div>

      <div>
        <a href="order-confirmation.html" class="btn btn-primary">📍 Rastrear Orden</a>
        <a href="index.html" class="btn btn-secondary">← Volver a la Tienda</a>
      </div>
    </div>
  </div>

  <script>
    // Mostrar ID de orden
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('orderId');
    if (orderId) document.getElementById('order-id').textContent = '#' + orderId;

    // Estrellas
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    for (let i = 0; i < 150; i++) {
      ctx.beginPath();
      ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + (Math.random() * 0.7 + 0.3) + ')';
      ctx.fill();
    }
  </script>
</body>
</html>
